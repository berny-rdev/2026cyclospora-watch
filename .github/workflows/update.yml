name: Update Cyclospora Watch Page

on:
  schedule:
    - cron: "17 * * * *" 
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]
    
concurrency:
  group: update-cyclospora-watch
  cancel-in-progress: true
  
permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("googlesheets4","dplyr","tidyr","stringr","lubridate","ggplot2","janitor","purrr","knitr","DT","rmarkdown","httr2","jsonlite"))'
      - name: Install mapcan (GitHub package, non-blocking if it fails)
        continue-on-error: true
        run: |
          Rscript -e 'if (!requireNamespace("remotes", quietly = TRUE)) install.packages("remotes"); remotes::install_github("mccormackandrew/mapcan")'
      - name: Render report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # required for LLM classification (CLASSIFICATION_METHOD = "llm" in index.Rmd); falls back to regex automatically if unset
        run: |
          Rscript -e 'rmarkdown::render("index.Rmd", output_file = "index.html")'

      - name: Commit and push updated page
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html category_vocabulary.json
          git diff --quiet --cached || git commit -m "Auto-update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
